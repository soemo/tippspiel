name: Continuous Deployment

on: [push]

jobs:
  cd:
    name: Continuous Integration
    runs-on: ubuntu-latest

    # If you need DB like MySQL then define service below.
    services:
      # How to use MySQL
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tippspiel_test
        ports:
        - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Verify MySQL connection from host
      run: |
        sudo /etc/init.d/mysql start
        mysql -h 127.0.0.1 --port ${{ job.services.mysql.ports[3306] }} -u root -proot -e "CREATE DATABASE IF NOT EXISTS tippspiel_test;"

    - name: create DB and run rspec tests
      env:
        RAILS_ENV: test
        DB_PASSWORD: ""
        # tell Rails to use proper port for MySQL
        DB_PORT: ${{ job.services.mysql.ports[3306] }}
        WEBSITE_URL: http://localhost:3000
        ADMIN_EMAIL: test-tippspiel@test.com
        MAIL: tippspiel@test.com
        SECRET_BASE_KEY: r90435943jv90t960dc87966cdfe8a6b730c1ecbee871d6a4b92e4687b34cb29d99f67981a8ca5522671db884aec9d1d0c296f1660bce_gha
        COOKIE_STORE_KEY: _gha_tippspiel_session
      run: |
        cp config/database.yml.gha-ci config/database.yml

        bundle exec rake db:create
        bundle exec rake db:migrate --trace
        bundle exec rake db:test:prepare

        bundle exec rake

    - name: Resolve version and patch config/version.rb
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          # Production deploy: derive version directly from the git tag (strip leading "v")
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag-based deploy – version: ${APP_VERSION}"
        else
          # Beta deploy: read the version name from the current release draft
          APP_VERSION=$(gh release list --repo "${{ github.repository }}" --limit 10 \
            --json isDraft,tagName \
            --jq '[.[] | select(.isDraft == true)] | first | .tagName | ltrimstr("v")' 2>/dev/null || true)

          if [[ -z "${APP_VERSION}" ]]; then
            echo "No release draft found, keeping version placeholder"
            exit 0
          fi
          echo "Branch-based deploy – version from draft: ${APP_VERSION}"
        fi

        # Patch the placeholder directly in the checked-out workspace.
        # Capistrano will upload this already-resolved file; the Capistrano
        # set_version_and_date task then only needs to replace ###PLACEHOLDER_BUILD_DATE###.
        sed -i "s/###PLACEHOLDER_VERSION###/${APP_VERSION}/" config/version.rb
        echo "config/version.rb after patching:"
        cat config/version.rb

    - name: capistrano deployment to beta-tippspiel
      if: github.ref == 'refs/heads/master'
      uses: miloserdow/capistrano-deploy@v3
      # https://github.com/miloserdow/capistrano-deploy/releases update to 3
      with:
        target: beta-tippspiel
        deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        enc_rsa_key_pth: config/deploy_id_ed25519_enc

    - name: capistrano deployment to tippspiel (prod on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: miloserdow/capistrano-deploy@v3
      with:
        target: tippspiel
        deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        enc_rsa_key_pth: config/deploy_id_ed25519_enc
