<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wartung – Tippspiel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #2F2F28;
      background-color: #fefefe;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Nav bar ─────────────────────────────────────── */
    nav {
      background-color: #AF1C1C;
      padding: 0 1rem;
      height: 50px;
      display: flex;
      align-items: center;
    }

    nav .brand {
      color: #fefefe;
      font-size: 1.25rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    /* ── Main content ────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .callout {
      max-width: 560px;
      width: 100%;
      border: 1px solid #e6e6e6;
      border-top: 4px solid #AF1C1C;
      border-radius: 3px;
      padding: 2rem 2.5rem;
      text-align: center;
    }

    .callout svg {
      color: #AF1C1C;
      margin-bottom: 1rem;
    }

    .callout h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: #2F2F28;
    }

    .callout p {
      font-size: 1rem;
      font-weight: 300;
      color: #555;
      margin: 0;
    }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      padding: 0.75rem 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #8a8a8a;
      border-top: 1px solid #e6e6e6;
    }
  </style>
</head>
<body>

  <nav>
    <span class="brand">Tippspiel</span>
  </nav>

  <main>
    <div class="callout">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M13 2v10h-2V2h2zm0 14v2h-2v-2h2zM12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"/>
      </svg>
      <h1>Kurze Wartungspause / Short Maintenance Break</h1>
      <p>Die Seite wird aktuell gewartet. Bitte probiere es später wieder.</p>
      <p lang="en">The site is currently undergoing maintenance. Please come back in a few minutes.</p>
    </div>
  </main>

  <footer>
    &copy; Tippspiel
  </footer>

</body>
</html>
