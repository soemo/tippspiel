plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-rspec_rails

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  TargetRailsVersion: 6.1
  SuggestExtensions: false
  Exclude:
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'db/seeds.rb'
    - 'db/seeds/**/*'
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'config/deploy/**/*'
    - 'Rakefile'

# Rails apps rarely need doc comments on every class/module
Style/Documentation:
  Enabled: false

# Metrics: loosen thresholds to reflect real-world Rails controllers/helpers
Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'lib/tasks/**/*'
Metrics/AbcSize:
  Max: 30
Metrics/BlockLength:
  Max: 30
  Exclude:
    - 'spec/**/*'
    - 'config/routes.rb'
    - 'lib/tasks/**/*'
Metrics/ClassLength:
  Max: 200
Metrics/ModuleLength:
  Max: 200
Metrics/CyclomaticComplexity:
  Max: 10
Metrics/PerceivedComplexity:
  Max: 10

# Config files often have long strings (URLs, paths) that can't be split
# SQL strings in service objects are also commonly long and hard to wrap
Layout/LineLength:
  Max: 150
  Exclude:
    - 'config/**/*'
    - 'spec/**/*'

# $GLOBAL_VARS in config/version.rb and config/environments are intentional Rails init pattern
Style/GlobalVars:
  Exclude:
    - 'config/**/*'
    - 'app/helpers/application_helper.rb'

# update_column/update_columns intentionally skips validations/callbacks in specs (test setup)
# and in certain service objects (bulk performance updates). Disable for specs and rake tasks globally.
Rails/SkipsModelValidations:
  Exclude:
    - 'spec/**/*'
    - 'lib/tasks/**/*'

# Numeric suffixes in variable names are intentional in specs (data descriptions)
Naming/VariableNumber:
  Exclude:
    - 'spec/**/*'

# 'fd' (football data match object) and 'u' (user in test helpers) are well-understood abbreviations
Naming/MethodParameterName:
  AllowedNames:
    - fd
    - u

# RSpec structural preferences — too opinionated for an existing test suite
RSpec/MultipleExpectations:
  Enabled: false
RSpec/ExampleLength:
  Enabled: false
RSpec/NamedSubject:
  Enabled: false
RSpec/InstanceVariable:
  Enabled: false
RSpec/IndexedLet:
  Enabled: false
RSpec/MultipleMemoizedHelpers:
  Enabled: false
RSpec/ContextWording:
  Enabled: false
RSpec/MessageSpies:
  Enabled: false
RSpec/StubbedMock:
  Enabled: false
RSpec/ExpectInHook:
  Enabled: false
RSpec/LetSetup:
  Enabled: false
RSpec/NestedGroups:
  Enabled: false
RSpec/SubjectStub:
  Enabled: false
RSpec/VerifiedDoubles:
  Enabled: false
RSpec/AnyInstance:
  Enabled: false
RSpec/DescribeClass:
  Enabled: false
RSpec/RepeatedDescription:
  Enabled: false
RSpec/RepeatedExampleGroupBody:
  Enabled: false
RSpec/RepeatedExampleGroupDescription:
  Enabled: false
RSpec/VoidExpect:
  Enabled: false
RSpec/LeakyConstantDeclaration:
  Enabled: false

# Rails/StrongParametersExpect uses params.expect() which is a Rails 8+ API
Rails/StrongParametersExpect:
  Enabled: false
